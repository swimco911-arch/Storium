<!DOCTYPE html>
<html>
<head>
    <title>제미나이 스토리북 서재</title>
    <style>
        body { background-color: #2c1b10; display: flex; justify-content: center; padding: 50px; }
        /* 책장 디자인 */
        .shelf {
            width: 80%; border-bottom: 20px solid #5d4037;
            display: flex; align-items: flex-end; gap: 10px; padding: 10px;
        }
        /* 공통 책 디자인 */
        .book {
            width: 40px; height: 150px; color: white; cursor: pointer;
            writing-mode: vertical-rl; text-align: center; padding: 10px 0;
            font-weight: bold; border-radius: 3px 3px 0 0; transition: 0.3s;
        }
        .book:hover { transform: translateY(-20px); }
        /* 카테고리별 색상 */
        .fantasy { background: #9c27b0; }
        .sf { background: #2196f3; }
        .cook { background: #4caf50; }
    </style>
</head>
<body>
    <div class="shelf">
        <div class="book fantasy" onclick="alert('요약: 숲속의 요정 이야기')">숲속의 요정</div>
        <div class="book sf" onclick="alert('요약: 화성에 간 강아지')">화성 강아지</div>
        <div class="book cook" onclick="alert('요약: 할머니 레시피')">할머니 손맛</div>
        <div class="book fantasy" onclick="alert('요약: 마법 지팡이')">마법 지팡이</div>
        <div class="book sf" onclick="alert('요약: 우주 정거장')">우주 정거장</div>
    </div>
</body>
</html>
