        <input type="email" id="auth-email" placeholder="example@email.com" autocomplete="email" />
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      ${mode === 'signup' ? `<p class="pw-hint">* 비밀번호는 대문자·소문자·숫자·특수문자 포함 6자 이상</p>` : ''}
      <div class="auth-error" id="auth-error"></div>
      <button class="auth-submit" id="auth-submit">${mode === 'login' ? '이메일로 로그인' : '이메일로 회원가입'}</button>

      <div class="auth-divider"></div>
      <div class="auth-switch">
        ${mode === 'login'
          ? `계정이 없으신가요? <button id="auth-mode-toggle">회원가입</button>`
          : `이미 계정이 있으신가요? <button id="auth-mode-toggle">로그인</button>`}
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const emailInput = document.getElementById('auth-email');
  const passInput  = document.getElementById('auth-password');
  const errEl      = document.getElementById('auth-error');
  const submitBtn  = document.getElementById('auth-submit');

  document.getElementById('auth-close').addEventListener('click', closeAuthModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeAuthModal(); });
  document.getElementById('auth-mode-toggle').addEventListener('click', () => {
    closeAuthModal(); openAuthModal(mode === 'login' ? 'signup' : 'login');
  });
  document.getElementById('google-btn').addEventListener('click', async () => {
    const err = await doGoogleSignIn();
    if (err) { errEl.textContent = err; errEl.classList.add('show'); }
  });

  async function handleSubmit() {
    const email    = emailInput.value.trim();
    const password = passInput.value;
    errEl.classList.remove('show');
    if (!email || !password) { errEl.textContent = '이메일과 비밀번호를 입력해주세요.'; errEl.classList.add('show'); return; }
    submitBtn.disabled = true; submitBtn.textContent = '처리 중…';
    const nickname = document.getElementById('auth-nickname')?.value.trim() || '';
    if (mode === 'signup' && !nickname) { errEl.textContent = '닉네임을 입력해주세요.'; errEl.classList.add('show'); submitBtn.disabled = false; submitBtn.textContent = '이메일로 회원가입'; return; }
    const err = mode === 'login'
      ? await doEmailSignIn(email, password)
      : await doEmailSignUp(email, password, nickname);
    submitBtn.disabled = false;
    submitBtn.textContent = mode === 'login' ? '이메일로 로그인' : '이메일로 회원가입';
    if (err) { errEl.textContent = err; errEl.classList.add('show'); return; }
    closeAuthModal();
  }

  submitBtn.addEventListener('click', handleSubmit);
  passInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
  setTimeout(() => emailInput.focus(), 100);
}

function closeAuthModal() {
  const el = document.getElementById('auth-overlay');
  if (el) el.remove();
}

/* ============================================================
   STATS
   ============================================================ */
function updateStats() {
  const rc  = getReadCount();
  const tot = allBooks.length;
  const pct = tot ? Math.round(rc / tot * 100) : 0;
  const chip = document.getElementById('stat-chip');
  if (chip) chip.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> ${rc}권 읽음 ${pct > 0 ? `<span style="color:var(--accent-2);font-size:11px">(${pct}%)</span>` : ''}`;
}

/* ============================================================
   FILTER & SORT
   ============================================================ */
function getFilteredBooks() {
  const s = document.getElementById('search-input').value.toLowerCase().trim();
  let result = allBooks.filter(b => {
    if (s && !b.title?.toLowerCase().includes(s)) return false;
    if (filter.genre !== '전체' && b.category !== filter.genre) return false;
    if (filter.age   !== '전체' && b.age      !== filter.age)   return false;
    if (filter.readStatus === '읽음'   &&  !interactions[b.id]?.isRead) return false;
    if (filter.readStatus === '미읽음' &&   interactions[b.id]?.isRead) return false;
    if (showBookmarksOnly && !interactions[b.id]?.bookmarked) return false;
    if (showLikesOnly     && interactions[b.id]?.reaction !== 'like') return false;
    return true;
  });
  if (filter.sortBy === '랜덤' && randomOrder.length) {
    result.sort((a, b) => randomOrder.indexOf(a.id) - randomOrder.indexOf(b.id));
  } else if (filter.sortBy === '최신순') {
    result.sort((a, b) => new Date(b.date) - new Date(a.date));
  } else if (filter.sortBy === '오래된순') {
    result.sort((a, b) => new Date(a.date) - new Date(b.date));
  } else if (filter.sortBy === '가나다순') {
    result.sort((a, b) => (a.title || '').localeCompare(b.title || '', 'ko'));
  } else if (filter.sortBy === '조회순') {
    result.sort((a, b) => ((allStats?.[b.id]?.readers||0) - (allStats?.[a.id]?.readers||0)));
  } else if (filter.sortBy === '좋아요순') {
    result.sort((a, b) => ((allStats?.[b.id]?.likes||0) - (allStats?.[a.id]?.likes||0)));
  } else {
    result.sort((a, b) => new Date(b.date) - new Date(a.date));
  }
  return result;
}

/* ============================================================
   RENDER SHELF
   ============================================================ */
function isNewBook(book) {
  if (!book.date) return false;
  const d = new Date(book.date);
  return (Date.now() - d.getTime()) < 7 * 24 * 60 * 60 * 1000;
}


function renderShelf() {
  const books = getFilteredBooks();
  const box   = document.getElementById('shelf-box');
  if (!box) return;
  const N = getBooksPerRow();
  box.style.setProperty('--cols', N);

  const rc = document.getElementById('result-count');
  if (rc) rc.innerHTML = `총 <strong>${books.length}</strong>권 / 전체 ${allBooks.length}권`;

  const collectionLabel = document.querySelector('.collection-label-wrap');
  if (!books.length) {
    if (collectionLabel) collectionLabel.style.display = 'none';
    const searchVal = document.getElementById('search-input')?.value.trim();
    const hasGenre = filter.genre !== '전체';
    const hasAge   = filter.age   !== '전체';
    const isRead   = filter.readStatus === '읽음';
    const isUnread = filter.readStatus === '미읽음';
    let emptyMsg;
    // Search combined with MY filters
    if (searchVal && showLikesOnly && hasGenre)  emptyMsg = `좋아요한 ${filter.genre} 중 "${searchVal}"을 찾지 못했어요`;
    else if (searchVal && showLikesOnly)          emptyMsg = `좋아요한 이야기 중 "${searchVal}"을 찾지 못했어요`;
    else if (searchVal && showBookmarksOnly && hasGenre) emptyMsg = `찜한 ${filter.genre} 중 "${searchVal}"을 찾지 못했어요`;
    else if (searchVal && showBookmarksOnly)      emptyMsg = `찜한 이야기 중 "${searchVal}"을 찾지 못했어요`;
    else if (searchVal && hasGenre)               emptyMsg = `${filter.genre} 장르에서 "${searchVal}"을 찾지 못했어요`;
    else if (searchVal)                           emptyMsg = `"${searchVal}"에 대한 이야기를 찾지 못했어요`;
    // MY filters (likes/bookmarks) — isRead is always true when showLikesOnly, so skip read condition here
    else if (showLikesOnly && hasGenre && hasAge) emptyMsg = `${filter.genre} · ${filter.age} 조건의 좋아요한 이야기가 없어요`;
    else if (showLikesOnly && hasGenre)           emptyMsg = `${filter.genre} 장르의 좋아요한 이야기가 없어요`;
    else if (showLikesOnly && hasAge)             emptyMsg = `${filter.age} 대상의 좋아요한 이야기가 없어요`;
    else if (showLikesOnly)                       emptyMsg = `좋아요한 이야기가 없어요`;
    else if (showBookmarksOnly && hasGenre && hasAge) emptyMsg = `${filter.genre} · ${filter.age} 조건의 찜한 이야기가 없어요`;
    else if (showBookmarksOnly && hasGenre)       emptyMsg = `${filter.genre} 장르의 찜한 이야기가 없어요`;
    else if (showBookmarksOnly && hasAge)         emptyMsg = `${filter.age} 대상의 찜한 이야기가 없어요`;
    else if (showBookmarksOnly)                   emptyMsg = `찜한 이야기가 없어요`;
    // Read status filters
    else if (isRead && hasGenre && hasAge)        emptyMsg = `${filter.genre} · ${filter.age} 조건의 읽음 이야기가 없어요`;
    else if (isRead && hasGenre)                  emptyMsg = `${filter.genre} 장르의 읽음 이야기가 없어요`;
    else if (isRead && hasAge)                    emptyMsg = `${filter.age} 대상의 읽음 이야기가 없어요`;
    else if (isRead)                              emptyMsg = `읽음 상태의 이야기가 없어요`;
    else if (isUnread && hasGenre && hasAge)      emptyMsg = `${filter.genre} · ${filter.age} 조건의 미읽음 이야기가 없어요`;
    else if (isUnread && hasGenre)                emptyMsg = `${filter.genre} 장르의 미읽음 이야기가 없어요`;
    else if (isUnread && hasAge)                  emptyMsg = `${filter.age} 대상의 미읽음 이야기가 없어요`;
    else if (isUnread)                            emptyMsg = `미읽음 상태의 이야기가 없어요`;
    // Genre/age only
    else if (hasGenre && hasAge)                  emptyMsg = `${filter.genre} · ${filter.age} 조건의 이야기가 없어요`;
    else if (hasGenre)                            emptyMsg = `${filter.genre} 장르의 이야기가 없어요`;
    else if (hasAge)                              emptyMsg = `${filter.age} 대상의 이야기가 없어요`;
    else                                          emptyMsg = `등록된 이야기가 없어요`;
    box.innerHTML = `<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>${emptyMsg}</p></div>`;
    renderFeatured();
    updateResetBtn();
    return;
  }

  const SHELF_COUNT = 4;
  const rows = [];
  for (let i = 0; i < SHELF_COUNT; i++) rows.push(books.slice(i * N, (i + 1) * N));

  box.innerHTML = rows.map((row, rowIndex) => `
    <div class="shelf-row">
      <div class="books-grid">
        ${Array.from({ length: N }).map((_, ci) => {
          const b = row[ci];
          if (!b) return `<div class="book-slot"><div class="book-spacer"></div></div>`;
          const isRead       = interactions[b.id]?.isRead;
          const isBookmarked = interactions[b.id]?.bookmarked;
          const isNew        = isNewBook(b);
          const color        = getCatColor(b.category, b.id);
          const hasImg       = b.imgLink && b.imgLink.startsWith('http');
          return `
            <div class="book-slot">
              <div class="book-3d">
                ${isNew ? `<div class="new-badge">NEW</div>` : ''}
                ${isBookmarked ? `<div class="bookmark-ribbon"></div>` : ''}
                <div class="book-pages-top"></div>
                <div class="book-cover-face" style="background:${color};filter:brightness(1.5)">${hasImg ? `<img src="${b.imgLink}" alt="" loading="lazy">` : ''}</div>
                <div class="book-spine" style="background:${color}" data-id="${b.id}">
                  <span class="book-title-text">${b.title || ''}</span>
                  ${isRead ? `<div class="read-ribbon"></div>` : ''}
                </div>
              </div>
            </div>`;
        }).join('')}
      </div>
      <div class="shelf-plank"></div>
    </div>
  `).join('');

  // hover: 글로벌 fixed 프리뷰 + hovered 클래스
  box.querySelectorAll('.book-slot').forEach(slot => {
    const spine = slot.querySelector('.book-spine');
    if (!spine) return;
    slot.addEventListener('mouseenter', () => {
      slot.classList.add('hovered');
      const book = allBooks.find(b => b.id === spine.dataset.id);
      if (!book) return;
      const hasImg = book.imgLink?.startsWith('http');
      const bcolor = getCatColor(book.category, book.id);
      _gPreview.innerHTML = `
        ${hasImg ? `<div class="preview-img-wrap" style="position:relative"><img class="preview-img" src="${book.imgLink}" alt="" loading="lazy"/>${isNewBook(book) ? '<div class="preview-new-badge">NEW</div>' : ''}</div>` : ''}
        <div class="preview-info">
          <div class="preview-title">${book.title || ''}</div>
          ${book.category ? `<div class="preview-cat" style="background:${bcolor}">${book.category}</div>` : ''}
        </div>`;
      const r = slot.getBoundingClientRect();
      _gPreview.style.left = (r.left + r.width / 2) + 'px';
      _gPreview.style.top  = r.top + 'px';
      _gPreview.classList.add('visible');
    });
    slot.addEventListener('mouseleave', () => {
      slot.classList.remove('hovered');
      _gPreview.classList.remove('visible');
    });
  });
  if (collectionLabel) collectionLabel.style.display = '';
  renderFeatured();
  updateResetBtn();
}

// 글로벌 프리뷰 요소 (position:fixed → 3D 컨텍스트 밖)
const _gPreview = document.createElement('div');
_gPreview.id = 'global-preview';
document.body.appendChild(_gPreview);

// 클릭: book-slot 안의 책(book-3d 또는 preview) 클릭 → 모달 (renderShelf와 독립, 한 번만 등록)
document.getElementById('shelf-box').addEventListener('click', (e) => {
  if (e.target.closest('.shelf-plank')) return;
  const slot = e.target.closest('.book-slot');
  if (!slot) return;
  const spine = slot.querySelector('.book-spine');
  if (!spine) return;
  const book = allBooks.find(b => b.id === spine.dataset.id);
  if (book) openModal(book);
});

// 화면 크기 바뀌면 재렌더 — N이 실제로 바뀔 때만 (debounce)
let _lastCols = 0, _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    const n = getBooksPerRow();
    if (n !== _lastCols) { _lastCols = n; renderShelf(); }
    renderFeatured();
  }, 20);
});

/* ============================================================
   COMMENTS — Firestore books/{bookId}/comments
   ============================================================ */
async function loadComments(bookId) {
  const colRef = collection(db, 'books', bookId, 'comments');
  const q = query(colRef, orderBy('createdAt', 'asc'));
  const snap = await getDocs(q);
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function addComment(bookId, text) {
  if (!currentUser || !text.trim()) return null;
  const nickname = currentUser.displayName || currentUser.email?.split('@')[0] || '익명';
  return await addDoc(collection(db, 'books', bookId, 'comments'), {
    uid: currentUser.uid, nickname,
    text: text.trim(), createdAt: serverTimestamp()
  });
}

async function deleteComment(bookId, commentId) {
  await deleteDoc(doc(db, 'books', bookId, 'comments', commentId));
}

/* ============================================================
   MODAL
   ============================================================ */
async function openModal(book, { swap = false, bounce = false, fromBook = false } = {}) {
  history.replaceState({}, '', '#book-' + book.id);
  if (!swap) closeModal();
  const isRead       = interactions[book.id]?.isRead;
  const reaction     = interactions[book.id]?.reaction;
  const isBookmarked = interactions[book.id]?.bookmarked;
  const color        = getCatColor(book.category, book.id);
  const [comments, stats] = await Promise.all([loadComments(book.id), getBookStats(book.id)]);

  let overlay = document.getElementById('modal-overlay');
  let modalEl;
  if (swap && overlay) {
    modalEl = overlay.querySelector('.modal');
    modalEl.style.transition = 'opacity 0.1s ease, transform 0.1s ease';
    modalEl.style.opacity = '0';
    modalEl.style.transform = 'scale(0.97)';
    await new Promise(r => setTimeout(r, 100));
  } else {
    overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id        = 'modal-overlay';
    overlay.innerHTML = `
      <button class="modal-nav modal-nav-prev" id="modal-nav-prev" aria-label="이전 책">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="modal-nav modal-nav-next" id="modal-nav-next" aria-label="다음 책">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="modal"></div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    modalEl = overlay.querySelector('.modal');
  }
  modalEl.innerHTML = `
      <button class="modal-close" id="modal-close" aria-label="닫기">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div class="modal-layout">
        <!-- LEFT: 표지 이미지 패널 -->
        <div class="modal-left">
          ${book.imgLink
            ? `<img class="modal-img" src="${book.imgLink}" alt="" /><div class="modal-img-overlay"></div>`
            : `<div class="modal-no-img" style="background:${color}"></div>`}
          <div class="modal-stats-top">
            <span class="modal-stat">👍 ${Math.max(0,stats.likes||0)}</span>
            <span class="modal-stat">👎 ${Math.max(0,stats.dislikes||0)}</span>
            <span class="modal-stat">📖 ${Math.max(0,stats.readers||0)}</span>
          </div>
          <div class="modal-meta">
            <span class="modal-cat" style="background:${color}">${book.category || ''}</span>
            ${book.age ? `<span class="modal-age-badge">${book.age}</span>` : ''}
            ${isNewBook(book) ? '<div class="modal-new-badge">NEW</div>' : ''}
          </div>
          <span class="modal-date modal-date-corner">${book.date || ''}</span>
          <button class="btn-bookmark-icon tooltip-down ${isBookmarked ? 'active' : ''}" id="btn-bookmark" data-tooltip="${isBookmarked ? '찜 취소' : '찜하기'}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="${isBookmarked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2.5">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
            </svg>
          </button>
        </div>
        <!-- RIGHT: 정보 + 버튼 패널 -->
        <div class="modal-right">
          <div class="modal-title-row">
            <div class="modal-title">${book.title || ''}</div>
          </div>
          <div class="modal-summary">"${book.summary || '소개글이 없습니다.'}"</div>
          <div class="modal-divider"></div>
          <div class="modal-action-row">
            <button class="btn-read ${isRead ? 'done' : ''}" id="read-toggle" style="flex-direction:column;gap:0.15rem">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
              <span id="read-btn-label">${isRead ? '완독 완료 ✓' : '다 읽었어요'}</span>
              ${interactions[book.id]?.readAt ? `<span id="read-date" class="read-date">${new Date(interactions[book.id].readAt).toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'})}</span>` : '<span id="read-date"></span>'}
            </button>
            ${book.link && book.link !== '#' ? `<a href="${book.link}" target="_blank" rel="noopener noreferrer" class="btn-link-inline">
              읽으러 가기
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </a>` : ''}
          </div>
          <div id="reaction-area"></div>
          <button class="comment-open-btn" id="comment-open-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            댓글${comments.length > 0 ? ` (${comments.length})` : ''} 보기
          </button>
        </div>
      </div>
    </div>
  `;

  // fade in (swap 시) or bounce in (랜덤 추천)
  if (swap) {
    requestAnimationFrame(() => {
      modalEl.style.opacity = '1';
      modalEl.style.transform = 'scale(1)';
    });
  } else if (bounce) {
    modalEl.classList.add('modal-bounce');
    modalEl.addEventListener('animationend', () => modalEl.classList.remove('modal-bounce'), { once: true });
  } else if (fromBook) {
    // 책이 열리는 동시에 모달 크로스페이드
    const ov = document.getElementById('modal-overlay');
    if (ov) { ov.style.opacity = '0'; ov.style.transition = 'opacity 0.35s ease'; }
    modalEl.style.opacity = '0';
    modalEl.style.transform = 'scale(0.96)';
    modalEl.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
    requestAnimationFrame(() => {
      if (ov) ov.style.opacity = '1';
      modalEl.style.opacity = '1';
      modalEl.style.transform = 'scale(1)';
    });
  }

  // 기본 닫기
  document.getElementById('modal-close').addEventListener('click', closeModal);

  // 이전/다음 내비게이션
  const prevBtn = document.getElementById('modal-nav-prev');
  const nextBtn = document.getElementById('modal-nav-next');
  if (fromBook) {
    // 랜덤 추천 모달: 네비게이션 없음
    if (prevBtn) prevBtn.style.display = 'none';
    if (nextBtn) nextBtn.style.display = 'none';
    const overlay = document.getElementById('modal-overlay');
    if (overlay) overlay.dataset.noNav = '1';
  } else {
    if (prevBtn) prevBtn.style.display = '';
    if (nextBtn) nextBtn.style.display = '';
    const overlay = document.getElementById('modal-overlay');
    if (overlay) delete overlay.dataset.noNav;
    const filteredBooks = getFilteredBooks();
    const curIdx = filteredBooks.findIndex(b => b.id === book.id);
    if (prevBtn) { prevBtn.disabled = curIdx <= 0; prevBtn.onclick = () => openModal(filteredBooks[curIdx - 1], { swap: true }); }
    if (nextBtn) { nextBtn.disabled = curIdx >= filteredBooks.length - 1; nextBtn.onclick = () => openModal(filteredBooks[curIdx + 1], { swap: true }); }
  }


  // 번쩍임 없이 인플레이스 업데이트
  function refreshModalInteractions() {
    const iR  = interactions[book.id]?.isRead;
    const rxn = interactions[book.id]?.reaction;
    const bkm = interactions[book.id]?.bookmarked;

    const readBtn = document.getElementById('read-toggle');
    if (readBtn) {
      readBtn.className = `btn-read ${iR ? 'done' : ''}`;
      readBtn.style.cssText = 'flex-direction:column;gap:0.15rem';
      const ra = interactions[book.id]?.readAt;
      const dateStr = ra ? new Date(ra).toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}) : '';
      readBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span id="read-btn-label">${iR ? '완독 완료 ✓' : '다 읽었어요'}</span>${iR && dateStr ? `<span id="read-date" class="read-date">${dateStr}</span>` : '<span id="read-date"></span>'}`;
    }
    const bkmBtn = document.getElementById('btn-bookmark');
    if (bkmBtn) {
      const keepNoTooltip = bkmBtn.classList.contains('no-tooltip');
      bkmBtn.className = `btn-bookmark-icon tooltip-down${bkm ? ' active' : ''}${keepNoTooltip ? ' no-tooltip' : ''}`;
      bkmBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="${bkm ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;
      bkmBtn.setAttribute('data-tooltip', bkm ? '찜 취소' : '찜하기');
    }

    let reactionWrap = document.getElementById('reaction-area');
    if (iR && reactionWrap) {
      reactionWrap.innerHTML = `
        <div class="reaction-wrap">
          <span class="reaction-label">이 책 어땠나요?</span>
          <div class="reaction-btns">
            <button class="reaction-btn like ${rxn === 'like' ? 'active' : ''}" id="btn-like">👍 좋아요</button>
            <button class="reaction-btn dislike ${rxn === 'dislike' ? 'active' : ''}" id="btn-dislike">👎 별로에요</button>
          </div>
        </div>`;
      document.getElementById('btn-like').onclick = async () => {
        await saveInteraction(book.id, { reaction: interactions[book.id]?.reaction === 'like' ? null : 'like' });
        refreshModalInteractions();
      };
      document.getElementById('btn-dislike').onclick = async () => {
        await saveInteraction(book.id, { reaction: interactions[book.id]?.reaction === 'dislike' ? null : 'dislike' });
        refreshModalInteractions();
      };
    } else if (reactionWrap) {
      reactionWrap.innerHTML = '';
    }
  }

  refreshModalInteractions();

  // 읽음 토글
  document.getElementById('read-toggle').addEventListener('click', async () => {
    if (!currentUser) { closeModal(); openAuthModal('login'); return; }
    const newVal = !interactions[book.id]?.isRead;
    const existing = interactions[book.id]?.readAt;
    await saveInteraction(book.id, {
      isRead: newVal,
      ...(newVal ? { readAt: existing || new Date().toISOString() } : { reaction: null, readAt: null })
    });
    refreshModalInteractions();
  });

  // 찜 토글
  document.getElementById('btn-bookmark')?.addEventListener('click', async () => {
    if (!currentUser || currentUser.isAnonymous) { closeModal(); openAuthModal('login'); return; }
    const btn = document.getElementById('btn-bookmark');
    btn?.classList.add('no-tooltip');
    btn?.addEventListener('mouseleave', () => btn?.classList.remove('no-tooltip'), { once: true });
    await saveInteraction(book.id, { bookmarked: !interactions[book.id]?.bookmarked });
    refreshModalInteractions();
  });

  // 댓글 시트 열기
  document.getElementById('comment-open-btn').addEventListener('click', () => openCommentSheet(book, comments));

}

function openCommentSheet(book, comments) {
  const existing = document.getElementById('comment-sheet-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.className = 'comment-sheet-overlay';
  overlay.id = 'comment-sheet-overlay';

  const commentListHTML = comments.length === 0
    ? `<div class="comment-empty">첫 번째 댓글을 남겨보세요!</div>`
    : comments.map(c => `
        <div class="comment-item" data-cid="${c.id}">
          <div class="comment-header">
            <span class="comment-nick">${c.nickname || '익명'}</span>
            <span class="comment-time">${c.createdAt?.toDate ? new Date(c.createdAt.toDate()).toLocaleDateString('ko-KR') : ''}</span>
            ${currentUser && c.uid === currentUser.uid
              ? `<button class="comment-del" data-cid="${c.id}">삭제</button>` : ''}
          </div>
          <div class="comment-text">${c.text}</div>
        </div>`).join('');

  overlay.innerHTML = `
    <div class="comment-sheet">
      <div class="comment-sheet-header">
        <div class="comment-sheet-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          댓글 ${comments.length}
        </div>
        <button class="comment-sheet-close" id="sheet-close">✕</button>
      </div>
      <div class="comment-sheet-book">${book.title}</div>
      <div class="comments-list">${commentListHTML}</div>
      ${currentUser && !currentUser.isAnonymous ? `
      <div class="comment-input-wrap" style="margin-top:0.875rem;">
        <input class="comment-input" id="sheet-input" type="text" placeholder="댓글을 입력하세요..." maxlength="200" autocomplete="off" />
        <button class="comment-submit" id="sheet-submit">등록</button>
      </div>` : `<div class="comment-login-hint" style="margin-top:0.75rem;">댓글을 달려면 <button id="sheet-login-btn" style="background:none;border:none;cursor:pointer;color:var(--accent);font-weight:700;text-decoration:underline;">로그인</button>이 필요합니다.</div>`}
    </div>
  `;
  document.body.appendChild(overlay);

  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.getElementById('sheet-close').addEventListener('click', () => overlay.remove());
  document.getElementById('sheet-login-btn')?.addEventListener('click', () => {
    overlay.remove(); closeModal(); openAuthModal('login');
  });

  const input = document.getElementById('sheet-input');
  const submit = document.getElementById('sheet-submit');
  async function submitSheetComment() {
    const text = input?.value.trim();
    if (!text || submit?.disabled) return;
    submit.disabled = true;
    input.value = '';
    const ref = await addComment(book.id, text);

    // 새 댓글을 DOM에 직접 추가
    const nickname = currentUser.displayName || currentUser.email?.split('@')[0] || '익명';
    const commentsList = overlay.querySelector('.comments-list');
    const emptyEl = commentsList.querySelector('.comment-empty');
    if (emptyEl) emptyEl.remove();

    const newItem = document.createElement('div');
    newItem.className = 'comment-item';
    newItem.innerHTML = `
      <div class="comment-header">
        <span class="comment-nick">${nickname}</span>
        <span class="comment-time">${new Date().toLocaleDateString('ko-KR')}</span>
        <button class="comment-del">삭제</button>
      </div>
      <div class="comment-text">${text}</div>
    `;
    commentsList.appendChild(newItem);
    newItem.querySelector('.comment-del').addEventListener('click', async () => {
      if (ref?.id) await deleteComment(book.id, ref.id);
      newItem.remove();
    });

    // 시트 헤더 카운트 갱신
    const titleEl = overlay.querySelector('.comment-sheet-title');
    if (titleEl) {
      const prev = parseInt(titleEl.textContent.match(/\d+/)?.[0] || '0');
      titleEl.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> 댓글 ${prev + 1}`;
    }

    input.value = '';
    submit.disabled = false;
    commentsList.scrollTop = commentsList.scrollHeight;
  }
  submit?.addEventListener('click', submitSheetComment);
  input?.addEventListener('keydown', e => { if (e.key === 'Enter') submitSheetComment(); });

  overlay.querySelectorAll('.comment-del').forEach(btn => {
    btn.addEventListener('click', async () => {
      const item = btn.closest('.comment-item');
      await deleteComment(book.id, btn.dataset.cid);
      item.remove();
      const commentsList = overlay.querySelector('.comments-list');
      const remaining = commentsList.querySelectorAll('.comment-item').length;
      const titleEl = overlay.querySelector('.comment-sheet-title');
      if (titleEl) titleEl.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> 댓글 ${remaining}`;
      if (remaining === 0) commentsList.innerHTML = '<div class="comment-empty">첫 번째 댓글을 남겨보세요!</div>';
    });
  });
}

  const ages   = CONFIG.ages.length   > 1 ? CONFIG.ages   : ['전체', ...new Set(allBooks.map(b => b.age).filter(Boolean))];

  ).join('');

    `<button class="pill${filter.age === a ? ' active' : ''}" data-type="age" data-val="${a}">${a}</button>`
  ).join('');

  document.querySelectorAll('.pill').forEach(btn => {

  return filter.genre !== '전체' || filter.age !== '전체' || filter.readStatus !== '전체'

/* ============================================================
   CSV PARSER
   ============================================================ */
function parseCSV(text) {
  const rows = [];
  let field = '', row = [], inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i + 1];
    if (inQuote) {
      if (ch === '"' && next === '"') { field += '"'; i++; }
      else if (ch === '"') inQuote = false;
      else field += ch;
    } else {
      if (ch === '"') inQuote = true;
      else if (ch === ',') { row.push(field); field = ''; }
      else if (ch === '\n' || ch === '\r') {
        if (ch === '\r' && next === '\n') i++;
        row.push(field); field = '';
        if (row.some(c => c !== '')) rows.push(row);
        row = [];
      } else field += ch;
    }
  }
  if (field || row.length) { row.push(field); if (row.some(c => c !== '')) rows.push(row); }
  return rows;
}
function csvToObjects(text) {
  const rows = parseCSV(text.trim());
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).map(vals => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
    if (obj.id) obj.imgLink = `https://raw.githubusercontent.com/swimco911-arch/storium/main/bookcovers/story_${obj.id}.png`;
    return obj;
  }).filter(o => o.id);
}

document.getElementById('random-btn').addEventListener('click', () => {
  const pool = allBooks.length ? allBooks : [];
  if (!pool.length) return;
  const btn = document.getElementById('random-btn');
  const icon = document.getElementById('random-icon');
  if (btn.classList.contains('rolling')) return;
  btn.classList.add('rolling');

  const finalBook = pool[Math.floor(Math.random() * pool.length)];
  icon.style.animation = 'icon-sparkle 0.35s ease forwards';
  setTimeout(() => { icon.style.animation = ''; }, 350);

  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  const W = 195, H = 270;
  const UFO_W = 150, UFO_H = 102;

  // ── Stage ──────────────────────────────────────────────
  const stage = document.createElement('div');
  stage.style.cssText = 'position:fixed;inset:0;z-index:99998;pointer-events:none;overflow:hidden;';
  document.body.appendChild(stage);

  const dim = document.createElement('div');
  dim.style.cssText = 'position:absolute;inset:0;background:rgba(8,4,2,0.65);opacity:0;transition:opacity 0.2s ease;';
  stage.appendChild(dim);
  requestAnimationFrame(() => { dim.style.opacity = '1'; });

  // ── UFO (starts top-left, flies to center-top) ─────────
  const ufoDestX = cx - UFO_W / 2;
  const ufoDestY = cy - H / 2 - UFO_H - 10;
  const ufo = document.createElement('div');
  ufo.style.cssText = `
    position:fixed;
    left:${ufoDestX}px; top:${ufoDestY}px;
    width:${UFO_W}px; height:${UFO_H}px;
    transform: translate(${-ufoDestX - UFO_W}px, ${-ufoDestY - UFO_H}px) scale(0.5) rotate(-20deg);
    opacity:0;
    transition: transform 0.7s cubic-bezier(0.22,1,0.36,1), opacity 0.25s ease;
    filter: drop-shadow(0 0 10px rgba(100,200,255,0.9));
  `;
  ufo.innerHTML = `<svg width="${UFO_W}" height="${UFO_H}" viewBox="0 0 24 16" fill="none">
    <path d="M9 7 Q9 2 12 2 Q15 2 15 7z" fill="#74c0fc"/>
    <path d="M10.5 3.5 Q11.5 2.2 12.5 2.5" stroke="white" stroke-width="0.6" stroke-linecap="round" opacity="0.8"/>
    <ellipse cx="12" cy="9" rx="10" ry="3.4" fill="#868e96"/>
    <ellipse cx="12" cy="8.4" rx="10" ry="2.7" fill="#adb5bd"/>
    <ellipse cx="12" cy="7.8" rx="7.5" ry="1.7" fill="#dee2e6"/>
    <circle cx="6"   cy="10.8" r="1.3" fill="#ff6b6b"/>
    <circle cx="9.5" cy="11.8" r="1.3" fill="#ffd580"/>
    <circle cx="14.5"cy="11.8" r="1.3" fill="#51cf66"/>
    <circle cx="18"  cy="10.8" r="1.3" fill="#74c0fc"/>
  </svg>`;
  stage.appendChild(ufo);

  // UFO 날아오기
  requestAnimationFrame(() => requestAnimationFrame(() => {
    ufo.style.transform = 'translate(0,0) scale(1) rotate(0deg)';
    ufo.style.opacity = '1';
  }));

  // UFO 도착 후: 빔 서서히 펼쳐짐 + 작은 책 낙하 (750ms)
  setTimeout(() => {
    // ── 빔 (좁고 서서히) ─────────────────────────────────
    const BW = 33, BH = 47;          // tiny book — UFO(150px)보다 훨씬 작은 책
    const beamHalf = 21;             // 빔 반폭
    const beamMaxH = 108;            // 빔 최대 높이
    const beamY = ufoDestY + UFO_H - 4;
    const beamTipY = beamY + beamMaxH; // 빔 끝(책이 떨어지는 지점) Y

    const beam = document.createElement('div');
    beam.style.cssText = `
      position:fixed; left:${cx - beamHalf}px; top:${beamY}px;
      width:0; height:0;
      border-left:${beamHalf}px solid transparent;
      border-right:${beamHalf}px solid transparent;
      border-top:0px solid rgba(160,230,255,0.48);
      opacity:0;
      transition: border-top-width 0.85s ease, opacity 0.3s ease;
    `;
    stage.appendChild(beam);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      beam.style.borderTopWidth = `${beamMaxH}px`;
      beam.style.opacity = '1';
    }));

    // 삐리삐리 링
    for (let i = 0; i < 3; i++) {
      setTimeout(() => {
        const r = document.createElement('div');
        const rSize = 54 + i * 21;
        r.style.cssText = `
          position:fixed;
          left:${cx - rSize/2}px; top:${ufoDestY + UFO_H/2 - rSize/2}px;
          width:${rSize}px; height:${rSize}px; border-radius:50%;

          transform:scale(0.3); opacity:0.8;
          transition: transform 0.45s ease-out, opacity 0.45s ease-out;

        stage.appendChild(r);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          r.style.transform = 'scale(2.5)';
          r.style.opacity = '0';
        }));
      }, i * 120);
    }

    // ── 작은 책: 빔 끝에서 등장 후 낙하 ─────────────────
    const bookEl = document.createElement('div');
    const fc = ['#c0392b','#2471a3','#1e8449','#7d3c98','#ca6f1e'];
    const bookOriginX = cx - BW/2;
    const bookOriginY = beamTipY - BH - 6;

      bookEl.appendChild(img);
    } else {
      bookEl.style.background = fc[Math.floor(Math.random()*fc.length)];
    }
    stage.appendChild(bookEl);

    // 빔 절반쯤 열릴 때 책 등장 + 낙하
    setTimeout(() => {
      bookEl.style.opacity = '1';
      bookEl.style.transform = 'translateY(48px) scale(1)'; // 빔 끝에서 아래로 뚝 떨어짐

      // UFO + 빔 퇴장, 책 중앙으로 이동
      setTimeout(() => {
        ufo.style.transition = 'transform 0.55s cubic-bezier(0.4,0,1,1), opacity 0.4s ease';
        ufo.style.transform = `translate(${window.innerWidth - ufoDestX + 80}px, ${-ufoDestY - 100}px) scale(0.25) rotate(25deg)`;
        ufo.style.opacity = '0';
        beam.style.transition = 'opacity 0.4s ease';
        beam.style.opacity = '0';

        // 작은 책 → 화면 중앙으로 부드럽게 이동 + 살짝 성장 (scale 기반)
        const scale = 96 / BW; // ~2.9×
        const destTx = cx - (bookOriginX + BW/2); // 중앙까지 X 이동량
        const destTy = cy - (bookOriginY + BH/2);  // 중앙까지 Y 이동량
        bookEl.style.transition = 'transform 0.65s cubic-bezier(0.4,0,0.2,1), box-shadow 0.65s ease';
        bookEl.style.transform = `translate(${destTx}px, ${destTy}px) scale(${scale})`;
        bookEl.style.boxShadow = '0 10px 36px rgba(0,0,20,0.85), 0 0 0 1px rgba(120,190,255,0.25)';

        // 모달 오픈
        setTimeout(() => {
          btn.classList.remove('rolling');
          openModal(finalBook, { fromBook: true });
        }, 700);

        // 스테이지 페이드아웃
        setTimeout(() => {
          stage.style.transition = 'opacity 0.3s ease';
          stage.style.opacity = '0';
          setTimeout(() => stage.remove(), 300);
        }, 750);

      }, 420); // 책 착지 후 퇴장
    }, 500); // 빔 절반쯤 펼쳐진 후

  }, 750); // UFO 도착 딜레이
});

function showToast(msg, duration = 1800) {
  const existing = document.getElementById('_toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.id = '_toast';
  el.textContent = msg;
  el.style.cssText = 'position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(0.5rem);z-index:99999;background:rgba(20,15,10,0.88);color:#fdf6ec;font-size:13px;font-weight:600;padding:0.55rem 1.2rem;border-radius:999px;pointer-events:none;opacity:0;transition:opacity 0.2s,transform 0.2s;backdrop-filter:blur(6px);border:0.5px solid rgba(255,255,255,0.1)';

function buildStarField() {
  const existing = document.getElementById('star-field');
  if (existing) existing.remove();
  const sf = document.createElement('div');
  sf.id = 'star-field';
  const W = window.innerWidth, H = window.innerHeight;

  // ── 별 3레이어 ──
  const layers = [
    { count: 130, minOp: 0.06, maxOp: 0.28, blur: 0, spread: 0 },
    { count: 70,  minOp: 0.30, maxOp: 0.65, blur: 0, spread: 0, twinkle: true },
    { count: 25,  minOp: 0.70, maxOp: 1.00, blur: 1, spread: 1, twinkle: true },
  ];
  const driftAnims = ['starDrift1','starDrift2','starDrift3'];
  const floatAnims = ['cosmicFloat1','cosmicFloat2','cosmicFloat3','cosmicFloat4'];
  layers.forEach(({ count, minOp, maxOp, blur, spread, twinkle }, li) => {
    const shadows = [];
    for (let i = 0; i < count; i++) {
      const x = Math.floor(Math.random() * W);
      const y = Math.floor(Math.random() * H);
      const op = (minOp + Math.random() * (maxOp - minOp)).toFixed(2);
      const tint = Math.random();
      const col = tint < 0.15 ? `180,210,255` : tint < 0.25 ? `255,240,180` : `210,225,255`;
      shadows.push(`${x}px ${y}px ${blur}px ${spread}px rgba(${col},${op})`);
    }
    const dot = document.createElement('div');
    dot.className = 'star-layer' + (twinkle ? ' twinkle' : '');
    const twinkleDur = (2 + Math.random() * 4).toFixed(1) + 's';
    const twinkleDelay = (Math.random() * 3).toFixed(1) + 's';
    // 별 레이어별 드리프트 속도 다르게 (원근감)
    const driftDur = [100, 75, 55][li];
    const driftAnim = driftAnims[li % driftAnims.length];
    const driftDelay = (Math.random() * 20).toFixed(1) + 's';
    if (twinkle) {
      dot.style.animation = `star-twinkle ${twinkleDur} ease-in-out ${twinkleDelay} infinite, ${driftAnim} ${driftDur}s ease-in-out ${driftDelay} alternate infinite`;
    } else {
      dot.style.animation = `${driftAnim} ${driftDur}s ease-in-out ${driftDelay} alternate infinite`;
    }
    dot.style.boxShadow = shadows.join(',');
    sf.appendChild(dot);
  });

  // ── 유성(슈팅스타) 3~6개 — 위치/딜레이/속도 완전 랜덤 ──
  const shootCount = 3 + Math.floor(Math.random() * 4);
  const shootAngles = [-45, -32, -20, -55, -15];
  for (let i = 0; i < shootCount; i++) {
    const el = document.createElement('div');
    el.className = 'shooting-star';
    el.style.left  = Math.floor(Math.random() * W) + 'px';
    el.style.top   = Math.floor(Math.random() * H * 0.7) + 'px';
    el.style.transform = `rotate(${shootAngles[Math.floor(Math.random()*shootAngles.length)]}deg)`;
    el.style.setProperty('--delay', (Math.random() * 28).toFixed(1) + 's');
    el.style.setProperty('--dur',   (0.8 + Math.random() * 2.0).toFixed(1) + 's');
    // 일부는 더 밝게
    if (Math.random() > 0.5) el.style.opacity = (0.5 + Math.random() * 0.5).toFixed(2);
    sf.appendChild(el);
  }

  // ── 행성 3~5개 ──
  // ── 태양계 행성 (수금지화목토천해명) ──
  const sc = Math.min(W, H) / 900; // 뷰포트 기준 배율
  const solarPlanets = [
    { name:'수성', sz:10,  ring:false,
      bg:`radial-gradient(circle at 35% 30%, #b0a898 0%, #787060 50%, #4a4038 100%)`,
      glow:'140,130,120' },
    { name:'금성', sz:25,  ring:false,
      bg:`radial-gradient(circle at 38% 28%, #f5e8a8 0%, #d4a84c 48%, #9a7018 100%)`,
      glow:'220,180,60' },
    { name:'지구', sz:27,  ring:false,
      bg:`radial-gradient(circle at 34% 28%, #98d0f8 0%, #2070d8 45%, #184898 100%)`,
      glow:'50,120,230' },
    { name:'화성', sz:16,  ring:false,
      bg:`radial-gradient(circle at 32% 30%, #d89070 0%, #a84828 55%, #6c2c14 100%)`,
      glow:'190,80,40' },
    { name:'목성', sz:90,  ring:false,
      bg:`repeating-linear-gradient(180deg,rgba(140,70,18,0.22) 0px,rgba(140,70,18,0.22) 5px,transparent 5px,transparent 11px,rgba(200,130,50,0.16) 11px,rgba(200,130,50,0.16) 16px,transparent 16px,transparent 22px),radial-gradient(circle at 36% 30%, #ead09a 0%, #c89050 38%, #a06820 100%)`,
      glow:'210,150,60' },
    { name:'토성', sz:72,  ring:true,  ringTilt:22, ringColor:'200,170,80',
      bg:`repeating-linear-gradient(180deg,rgba(180,150,60,0.14) 0px,rgba(180,150,60,0.14) 5px,transparent 5px,transparent 12px),radial-gradient(circle at 35% 28%, #eed898 0%, #c8a848 50%, #987020 100%)`,
      glow:'210,175,80' },
    { name:'천왕성', sz:46, ring:true, ringTilt:80, ringColor:'100,210,240',
      bg:`radial-gradient(circle at 36% 30%, #e0f8fc 0%, #7ad4ec 50%, #3898c0 100%)`,
      glow:'80,210,240' },
    { name:'해왕성', sz:44, ring:false,
      bg:`radial-gradient(circle at 32% 28%, #7898fc 0%, #2848e0 50%, #101878 100%)`,
      glow:'60,80,250' },
    { name:'명왕성', sz:7,  ring:false,
      bg:`radial-gradient(circle at 35% 30%, #ceb898 0%, #907860 55%, #5a4838 100%)`,
      glow:'155,130,100' },
  ];
  solarPlanets.forEach(pt => {
    const size = pt.sz * sc * (0.82 + Math.random() * 0.36);
    const el   = document.createElement('div');
    el.className = 'planet';
    el.style.width      = size + 'px';
    el.style.height     = size + 'px';
    el.style.left       = (Math.random() * (W + size * 0.5) - size * 0.25) + 'px';
    el.style.top        = (Math.random() * (H + size * 0.5) - size * 0.25) + 'px';
    el.style.background = pt.bg;
    el.style.opacity    = (0.30 + Math.random() * 0.50).toFixed(2);
    el.style.boxShadow  = `0 0 ${size*0.55}px rgba(${pt.glow},0.20), inset 0 0 ${size*0.3}px rgba(0,0,0,0.50)`;
    if (pt.ring) {
      const ring = document.createElement('div');
      ring.className = 'planet-ring';
      const rw = size * 2.5, rh = size * 0.32;
      ring.style.cssText =
        `width:${rw}px;height:${rh}px;left:${-(rw-size)/2}px;top:${size*0.34}px;` +
        `border:${Math.max(1.5, size*0.055)}px solid rgba(${pt.ringColor||pt.glow},0.50);` +
        `background:transparent;transform:rotate(${-pt.ringTilt}deg);`;
      el.appendChild(ring);
    }
    if (Math.random() > 0.45) {
      const fa  = floatAnims[Math.floor(Math.random() * floatAnims.length)];
      const dur = (95 + Math.random() * 115).toFixed(0);
      const del = (Math.random() * 55).toFixed(1);
      el.style.animation = `${fa} ${dur}s ease-in-out ${del}s alternate infinite`;
    }
    sf.appendChild(el);
  });

  document.body.insertBefore(sf, document.body.firstChild);
}

/* ============================================================
   STATS PANEL
   ============================================================ */
function openStatsPanel() {
  if (!currentUser) { openAuthModal('login'); return; }
  const overlay = document.createElement('div');
  overlay.className = 'stats-overlay'; overlay.id = 'stats-overlay';

  // 월별 집계
  const monthMap = {};
  const genreMap = {};
  let totalLikes = 0, totalDislikes = 0;

  Object.entries(interactions).forEach(([bookId, ix]) => {
    if (!ix.isRead) return;
    const book = allBooks.find(b => b.id === bookId);
    if (!book) return;

    // 월별
    const d = new Date(ix.readAt || ix.updatedAt || book.date || '');
    if (!isNaN(d)) {
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      monthMap[key] = (monthMap[key] || 0) + 1;
    }
    // 장르
    if (book.category) genreMap[book.category] = (genreMap[book.category] || 0) + 1;
    // 반응
    if (ix.reaction === 'like') totalLikes++;
    if (ix.reaction === 'dislike') totalDislikes++;
  });

  const readCount   = Object.values(interactions).filter(i => i.isRead).length;
  const bookmarkCnt = Object.values(interactions).filter(i => i.bookmarked).length;
  const pct         = allBooks.length ? Math.round(readCount / allBooks.length * 100) : 0;

  // 최근 3개월
  const months = [];
  for (let i = 2; i >= 0; i--) {
    const d = new Date(); d.setMonth(d.getMonth() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    months.push({ key, label: `${d.getMonth()+1}월`, count: monthMap[key] || 0 });
  }
  const maxMonth = Math.max(...months.map(m => m.count), 1);

  // 장르 히트맵
  const allGenreList = CONFIG.genres.filter(g => g !== '전체');
  const maxGenre = Math.max(...allGenreList.map(g => genreMap[g] || 0), 1);
  const accentRgb = isDark ? '100,150,185' : '217,119,6';
  const genreHTML = allGenreList.map(g => {
    const c = genreMap[g] || 0;
    const intensity = c === 0 ? 0.06 : 0.12 + (c / maxGenre) * 0.72;
    return `<div class="genre-cell" style="background:rgba(${accentRgb},${intensity.toFixed(2)})">
      <div class="genre-cell-count">${c}</div>
      <div class="genre-cell-name">${g}</div>
    </div>`;
  }).join('');

  // 최근 3개월 가로 바
  const monthlyHTML = months.map(m => `
    <div class="chart-bar-row">
      <div class="chart-bar-label">${m.label}</div>
      <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${Math.round(m.count/maxMonth*100)}%"></div></div>
      <div class="chart-bar-count">${m.count}권</div>
    </div>`).join('');

  overlay.innerHTML = `
    <div class="stats-panel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
        <h2 style="margin-bottom:0;">독서 통계</h2>
        <button class="modal-close" id="stats-close" style="position:static;display:flex;flex-shrink:0;background:var(--bg-2);color:var(--text-1);">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="stats-grid">
        <div class="stats-card" id="stats-read-card" style="cursor:pointer"><div class="val">${readCount}</div><div class="lbl">완독 →</div></div>
        <div class="stats-card" id="stats-likes-card" style="cursor:pointer"><div class="val">${totalLikes}</div><div class="lbl">좋아요 →</div></div>
        <div class="stats-card" id="stats-bookmark-card" style="cursor:pointer"><div class="val">${bookmarkCnt}</div><div class="lbl">찜한책 →</div></div>
      </div>

      <div class="stats-section-title">최근 3개월 완독</div>
      <div class="chart-bar-wrap">${monthlyHTML}</div>

      <div class="stats-section-title">장르별 완독</div>
      <div class="genre-grid">${genreHTML}</div>


    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('stats-close').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.getElementById('stats-bookmark-card').addEventListener('click', () => {
    overlay.remove();
    resetFilters();
    showBookmarksOnly = true;
    document.getElementById('bookmark-filter-btn').classList.add('active');
    renderShelf();
  });
  document.getElementById('stats-likes-card').addEventListener('click', () => {
    overlay.remove();
    resetFilters();
    showLikesOnly = true;
    filter.readStatus = '읽음';
    document.getElementById('likes-filter-btn').classList.add('active');
    document.querySelectorAll('[data-type="readStatus"]').forEach(b => {
      b.classList.toggle('active', b.dataset.val === '읽음');
    });
    const unreadBtn = document.querySelector('[data-type="readStatus"][data-val="미읽음"]');
    if (unreadBtn) unreadBtn.disabled = true;
    renderShelf();
  });
  document.getElementById('stats-read-card').addEventListener('click', () => {
    overlay.remove();
    resetFilters();
    filter.readStatus = '읽음';
    document.querySelectorAll('[data-type="readStatus"]').forEach(b => {
      b.classList.toggle('active', b.dataset.val === '읽음');
    });
    renderShelf();
  });
}

/* ============================================================
   FEATURED SHELF
   ============================================================ */
function renderFeatured() {
  const grid = document.getElementById('featured-grid');
  const row  = document.getElementById('faceout-row');
  if (!grid || !allBooks.length) return;

  // 현재 필터 조건에 맞는 책 중 recommend=1 인 것만
  const filtered = getFilteredBooks();
  let pool = filtered.filter(b => String(b.recommend).trim() === '1');

  // row를 먼저 보여줘야 offsetWidth가 0이 아님
  if (row) row.style.display = '';

  // 컨테이너 너비 기반 최대 표시 개수 계산 (책 너비 108px + gap 32px, 최대 5개)
  const bookW = 108, gapW = 32;
  const width = row ? row.offsetWidth : window.innerWidth;
  const maxBooks = Math.max(1, Math.floor((width + gapW) / (bookW + gapW)));
  const limit = Math.min(maxBooks, 5);

  if (pool.length > limit) {
    if (filter.sortBy === '랜덤') {
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
    }
    pool = pool.slice(0, limit);
  }

  // 추천 없으면 faceout-row 숨김
  if (!pool.length) { if (row) row.style.display = 'none'; return; }

  grid.style.justifyContent = 'center';

  grid.innerHTML = pool.map(book => {
    const color = getCatColor(book.category, book.id);
    const hasImg = book.imgLink?.startsWith('http');
    const isBookmarked = interactions[book.id]?.bookmarked;
    const isRead = interactions[book.id]?.isRead;
    const isNew = isNewBook(book);
    return `
      <div class="featured-book-wrap">
        ${isNew ? '<div class="featured-new-badge">NEW</div>' : ''}
        <div class="featured-book" data-id="${book.id}">
          ${hasImg ? `<img src="${book.imgLink}" alt="" loading="lazy" />` : ''}
          <div class="featured-book-bg" style="background:${color}"></div>
          ${isRead ? '<div class="read-ribbon"></div>' : ''}
          ${isBookmarked ? '<div class="bookmark-ribbon"></div>' : ''}
        </div>
      </div>`;
  }).join('');

  grid.querySelectorAll('.featured-book').forEach(el => {
    el.addEventListener('click', () => {
      const book = allBooks.find(b => b.id === el.dataset.id);
      if (book) openModal(book);
    });
  });
}

/* ============================================================
   DATA LOADING
   ============================================================ */
async function loadData() {
  try {
    const res = await fetch(CONFIG.sheetUrl);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    allBooks = csvToObjects(text);
    if (!allBooks.length) throw new Error('empty');
  } catch (err) {
    console.warn('Sheet load failed:', err.message);
    allBooks = [];
  }
  buildFilterPills();
  renderFeatured();
  updateStats();
  renderShelf();
  // URL hash로 공유된 책 자동 오픈
  const hashId = location.hash.startsWith('#book-') ? location.hash.slice(6) : null;
  if (hashId) { const b = allBooks.find(b => b.id === hashId); if (b) openModal(b); }
}

loadData();
</script>
